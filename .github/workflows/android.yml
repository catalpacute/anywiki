name: Android test and alpha update

on:
  workflow_dispatch:

jobs:
  build_alpha:
    runs-on: ubuntu-latest
    env:
      SIGNING_KEY_B64: ${{ secrets.SIGNING_KEY != '' && secrets.SIGNING_KEY || secrets.KEYSTORE_BASE64 != '' && secrets.KEYSTORE_BASE64 || vars.SIGNING_KEY != '' && vars.SIGNING_KEY || vars.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD_VALUE: ${{ secrets.KEY_STORE_PASSWORD != '' && secrets.KEY_STORE_PASSWORD || secrets.KEYSTORE_PASSWORD != '' && secrets.KEYSTORE_PASSWORD || vars.KEY_STORE_PASSWORD != '' && vars.KEY_STORE_PASSWORD || vars.KEYSTORE_PASSWORD }}
      KEY_ALIAS_VALUE: ${{ secrets.KEY_STORE_ALIAS != '' && secrets.KEY_STORE_ALIAS || secrets.KEY_ALIAS != '' && secrets.KEY_ALIAS || vars.KEY_STORE_ALIAS != '' && vars.KEY_STORE_ALIAS || vars.KEY_ALIAS }}
      KEY_PASSWORD_VALUE: ${{ secrets.KEY_PASSWORD != '' && secrets.KEY_PASSWORD || vars.KEY_PASSWORD }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'
    - uses: gradle/gradle-build-action@v3
    - name: Check for missing qq strings
      run: ./scripts/missing-qq.py
    - name: Checkout submodules
      run: git submodule update --init --recursive
    - name: Build, test, and lint
      run: ./gradlew clean ktlint assembleAlphaRelease lintAlphaRelease testAlphaDebugUnitTest --no-daemon
    - name: Validate signing variables
      run: |
        test -n "${SIGNING_KEY_B64}" || (echo "::error::Missing signing key" && exit 1)
        test -n "${KEYSTORE_PASSWORD_VALUE}" || (echo "::error::Missing keystore password" && exit 1)
        test -n "${KEY_ALIAS_VALUE}" || (echo "::error::Missing key alias" && exit 1)
        test -n "${KEY_PASSWORD_VALUE}" || (echo "::error::Missing key password" && exit 1)
    - name: List
      run: ls -alR ./app/build/outputs/apk/
    - uses: kevin-david/zipalign-sign-android-release@v2
      name: Sign APK
      id: build_signed
      with:
        releaseDirectory: app/build/outputs/apk/alpha/release
        signingKeyBase64: ${{ env.SIGNING_KEY_B64 }}
        alias: ${{ env.KEY_ALIAS_VALUE }}
        keyStorePassword: ${{ env.KEYSTORE_PASSWORD_VALUE }}
        keyPassword: ${{ env.KEY_PASSWORD_VALUE }}
      env:
        # override default build-tools (optional)
        BUILD_TOOLS_VERSION: "35.0.0"
    - name: Create hash
      run: git rev-parse HEAD > app/build/outputs/apk/alpha/release/rev-hash.txt
    - name: Normalize APK names
      run: |
        RELEASE_DIR="app/build/outputs/apk/alpha/release"
        mapfile -t SIGNED_INPUTS < <(find "${RELEASE_DIR}" -maxdepth 1 -type f -name '*signed.apk' | sort)
        if [ "${#SIGNED_INPUTS[@]}" -ne 3 ]; then
          echo "::error::Expected exactly 3 signed ABI APKs, found ${#SIGNED_INPUTS[@]}"
          printf '%s\n' "${SIGNED_INPUTS[@]}"
          exit 1
        fi

        for INPUT_APK in "${SIGNED_INPUTS[@]}"; do
          BASENAME="$(basename "${INPUT_APK}")"
          case "${BASENAME}" in
            *arm64-v8a*) ABI="arm64-v8a" ;;
            *armeabi-v7a*) ABI="armeabi-v7a" ;;
            *x86_64*) ABI="x86_64" ;;
            *)
              echo "::error::Unable to infer ABI from ${BASENAME}"
              exit 1
              ;;
          esac
          cp "${INPUT_APK}" "${RELEASE_DIR}/app-alpha-${ABI}-release-signed.apk"
        done
    - uses: dev-drprasad/delete-tag-and-release@v1.1
      name: Delete latest alpha tag and release
      with:
        tag_name: latest
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Sleep for 30 seconds, to allow the tag to be deleted
      run: sleep 30s
      shell: bash
    - uses: ncipollo/release-action@v1.21.0
      name: Create new tag and release and upload artifacts
      with:
        name: latest
        commit: main
        tag: latest
        artifacts: "app/build/outputs/apk/alpha/release/app-alpha-arm64-v8a-release-signed.apk,app/build/outputs/apk/alpha/release/app-alpha-armeabi-v7a-release-signed.apk,app/build/outputs/apk/alpha/release/app-alpha-x86_64-release-signed.apk,app/build/outputs/apk/alpha/release/rev-hash.txt"
        body: This is the latest Alpha version of the app (autogenerated).
        token: ${{ secrets.GITHUB_TOKEN }}
