name: AnyWiki Signed APK

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_signed_apk:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 != '' && secrets.KEYSTORE_BASE64 || secrets.SIGNING_KEY != '' && secrets.SIGNING_KEY || vars.KEYSTORE_BASE64 != '' && vars.KEYSTORE_BASE64 || vars.SIGNING_KEY }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD != '' && secrets.KEYSTORE_PASSWORD || secrets.KEY_STORE_PASSWORD != '' && secrets.KEY_STORE_PASSWORD || vars.KEYSTORE_PASSWORD != '' && vars.KEYSTORE_PASSWORD || vars.KEY_STORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS != '' && secrets.KEY_ALIAS || secrets.KEY_STORE_ALIAS != '' && secrets.KEY_STORE_ALIAS || vars.KEY_ALIAS != '' && vars.KEY_ALIAS || vars.KEY_STORE_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD != '' && secrets.KEY_PASSWORD || vars.KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Validate signing variables
        run: |
          test -n "${KEYSTORE_BASE64}" || (echo "::error::Missing KEYSTORE_BASE64" && exit 1)
          test -n "${KEYSTORE_PASSWORD}" || (echo "::error::Missing KEYSTORE_PASSWORD" && exit 1)
          test -n "${KEY_ALIAS}" || (echo "::error::Missing KEY_ALIAS" && exit 1)
          test -n "${KEY_PASSWORD}" || (echo "::error::Missing KEY_PASSWORD" && exit 1)

      - name: Checkout submodules
        run: git submodule update --init --recursive

      - name: Build APK (alpha release)
        run: ./gradlew clean assembleAlphaRelease --no-daemon

      - name: List unsigned APK outputs
        run: ls -al app/build/outputs/apk/alpha/release

      - name: Sign APK
        id: sign_apk
        uses: kevin-david/zipalign-sign-android-release@v2
        with:
          releaseDirectory: app/build/outputs/apk/alpha/release
          signingKeyBase64: ${{ env.KEYSTORE_BASE64 }}
          alias: ${{ env.KEY_ALIAS }}
          keyStorePassword: ${{ env.KEYSTORE_PASSWORD }}
          keyPassword: ${{ env.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: List signed APK outputs
        run: ls -al app/build/outputs/apk/alpha/release

      - name: Normalize output names
        run: |
          RELEASE_DIR="app/build/outputs/apk/alpha/release"
          mapfile -t SIGNED_INPUTS < <(find "${RELEASE_DIR}" -maxdepth 1 -type f -name '*signed.apk' | sort)

          if [ "${#SIGNED_INPUTS[@]}" -ne 3 ]; then
            echo "::error::Expected exactly 3 signed ABI APKs, found ${#SIGNED_INPUTS[@]}"
            printf '%s\n' "${SIGNED_INPUTS[@]}"
            exit 1
          fi

          for INPUT_APK in "${SIGNED_INPUTS[@]}"; do
            BASENAME="$(basename "${INPUT_APK}")"
            case "${BASENAME}" in
              *arm64-v8a*) ABI="arm64-v8a" ;;
              *armeabi-v7a*) ABI="armeabi-v7a" ;;
              *x86_64*) ABI="x86_64" ;;
              *)
                echo "::error::Unable to infer ABI from ${BASENAME}"
                exit 1
                ;;
            esac

            cp "${INPUT_APK}" "${RELEASE_DIR}/anywiki-alpha-${ABI}-signed.apk"
          done

      - name: Upload signed APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: anywiki-alpha-release-signed
          path: |
            app/build/outputs/apk/alpha/release/anywiki-alpha-arm64-v8a-signed.apk
            app/build/outputs/apk/alpha/release/anywiki-alpha-armeabi-v7a-signed.apk
            app/build/outputs/apk/alpha/release/anywiki-alpha-x86_64-signed.apk
