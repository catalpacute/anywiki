name: AnyWiki Tag Release

on:
  push:
    tags:
      - "v*"
      - "anywiki-v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release_signed_apk:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 != '' && secrets.KEYSTORE_BASE64 || vars.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD != '' && secrets.KEYSTORE_PASSWORD || vars.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS != '' && secrets.KEY_ALIAS || vars.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD != '' && secrets.KEY_PASSWORD || vars.KEY_PASSWORD }}

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ inputs.tag_name }}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Validate signing variables
        run: |
          test -n "${KEYSTORE_BASE64}" || (echo "::error::Missing KEYSTORE_BASE64" && exit 1)
          test -n "${KEYSTORE_PASSWORD}" || (echo "::error::Missing KEYSTORE_PASSWORD" && exit 1)
          test -n "${KEY_ALIAS}" || (echo "::error::Missing KEY_ALIAS" && exit 1)
          test -n "${KEY_PASSWORD}" || (echo "::error::Missing KEY_PASSWORD" && exit 1)

      - name: Checkout submodules
        run: git submodule update --init --recursive

      - name: Build APK (alpha release)
        run: ./gradlew clean assembleAlphaRelease --no-daemon

      - name: Sign APK
        id: sign_apk
        uses: kevin-david/zipalign-sign-android-release@v2
        with:
          releaseDirectory: app/build/outputs/apk/alpha/release
          signingKeyBase64: ${{ env.KEYSTORE_BASE64 }}
          alias: ${{ env.KEY_ALIAS }}
          keyStorePassword: ${{ env.KEYSTORE_PASSWORD }}
          keyPassword: ${{ env.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Prepare release artifacts
        id: files
        run: |
          TAG="${{ steps.tag.outputs.tag_name }}"
          SIGNED_APK="app/build/outputs/apk/alpha/release/anywiki-${TAG}-alpha-signed.apk"
          SHA_FILE="app/build/outputs/apk/alpha/release/anywiki-${TAG}-alpha-signed.sha256"
          cp "${{ steps.sign_apk.outputs.signedReleaseFile }}" "${SIGNED_APK}"
          sha256sum "${SIGNED_APK}" > "${SHA_FILE}"
          echo "signed_apk=${SIGNED_APK}" >> "$GITHUB_OUTPUT"
          echo "sha_file=${SHA_FILE}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag exists for manual dispatch
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          git tag "${{ steps.tag.outputs.tag_name }}" "${GITHUB_SHA}" || true
          git push origin "${{ steps.tag.outputs.tag_name }}" || true

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1.21.0
        with:
          tag: ${{ steps.tag.outputs.tag_name }}
          name: ${{ steps.tag.outputs.tag_name }}
          allowUpdates: true
          replacesArtifacts: true
          prerelease: true
          body: |
            Automated AnyWiki Reader signed APK release.
            Commit: ${{ github.sha }}
          artifacts: ${{ steps.files.outputs.signed_apk }},${{ steps.files.outputs.sha_file }}
          token: ${{ secrets.GITHUB_TOKEN }}
